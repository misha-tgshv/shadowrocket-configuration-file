name: Generate shadowrocket rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- Создание папок ---
      - name: Создаем папки для артефактов
        run: |
          mkdir -p rules scripts modules conf

      - name: Генерируем domains_geo_detect.list
        run: |
          curl -s https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ip-geo-detect.list \
            | tr -d '\r' \
            | grep -v '^#' \
            | grep -v '^$' \
            | sed -E 's/^\+\.//' \
            | sed -E 's/^\.//' \
            | grep -v '\.ru$' \
            | sed 's/^/DOMAIN-SUFFIX,/' \
            | sort -u > temp_geo_detect.txt
          {
            echo "# NAME: domains_geo_detect.list"
            echo "# AUTHOR: misha-tgshv"
            echo "# REPO: https://github.com/misha-tgshv/shadowrocket-configuration-file"
            echo "# UPDATED: $(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M:%S') MSK"
            echo "# SOURCE: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ip-geo-detect.list"
            echo "# Количество доменов: $(wc -l < temp_geo_detect.txt)"
            cat temp_geo_detect.txt
          } > rules/domains_geo_detect.list
          rm temp_geo_detect.txt

      - name: Получаем только IP-адреса из доменов
        run: |
          curl -s https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/refs/heads/main/source/domains.list > temp_domains.txt
          > rules/domain_ips.list
          while read domain; do
            [ -z "$domain" ] && continue
            [[ $domain =~ ^# ]] && continue
            ip=$(dig +short "$domain" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
            if [ -n "$ip" ]; then
              echo "$ip" >> rules/domain_ips.list
            fi
          done < temp_domains.txt
          rm temp_domains.txt

      # --- Генерация файлов --- 
      - name: Генерируем domains_community.list
        run: |
          curl -s https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/source/community.list | \
          tr -d '\r' | \
          awk '
            BEGIN {
              print "# NAME: domains_community.list";
              print "# AUTHOR: misha-tgshv";
              print "# REPO: https://github.com/misha-tgshv/shadowrocket-configuration-file";
              print "# UPDATED: " strftime("%Y-%m-%d %H:%M:%S", systime(), 1) " MSK";
              print "# SOURCE: https://github.com/misha-tgshv/shadowrocket-configuration-file/blob/main/rules/domains_community.list";
              before_youtube=1
            }
            /^#/ {
              print;
              if ($0 == "# youtube") { before_youtube=0 }
              next
            }
            NF == 0 { next }
            {
              if (before_youtube) {
                print "DOMAIN-KEYWORD," $0
              } else {
                print "DOMAIN-SUFFIX," $0
              }
            }
          ' > rules/domains_community.list

      - name: Генерируем domains_antifilter.list
        run: |
          curl -sSL https://community.antifilter.download/list/domains.lst \
            | sed -E 's/^\+\./DOMAIN-SUFFIX,/; s/^[^D]/DOMAIN-SUFFIX,&/' \
            | sed '/www|spotify.com/d' \
            | awk '!seen[$0]++' > temp_list.txt
          echo "# Количество доменов: $(wc -l < temp_list.txt)" > rules/domains_antifilter.list
          cat temp_list.txt >> rules/domains_antifilter.list
          rm temp_list.txt

      - name: Генерируем ips_antifilter.list
        run: |
          curl -s https://community.antifilter.download/list/community.lst \
            | sed 's/^/IP-CIDR,/g' \
            | sort -u > temp_aips.txt
          echo "# Количество IP-адресов: $(wc -l < temp_aips.txt)" > rules/ips_antifilter.list
          cat temp_aips.txt >> rules/ips_antifilter.list
          rm temp_aips.txt

      - name: Генерируем domains_refilter.list
        run: |
          curl -s https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/community.lst > temp.txt
          curl -s https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/domains_all.lst >> temp.txt
          grep -v "mega555" temp.txt > temp2.txt
          grep -v "spotify.com" temp2.txt > temp3.txt
          rm temp.txt temp2.txt
          echo "# NAME: domains_refilter.list" > rules/domains_refilter.list
          echo "# AUTHOR: misha-tgshv" >> rules/domains_refilter.list
          echo "# REPO: https://github.com/misha-tgshv/shadowrocket-configuration-file" >> rules/domains_refilter.list
          echo "# UPDATED: $(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M:%S')" MSK >> rules/domains_refilter.list
          echo "# SOURCE: https://github.com/1andrevich/Re-filter-lists" >> rules/domains_refilter.list
          sed 's/^/DOMAIN-SUFFIX,/g' temp3.txt | tee domaintmp
          wc -l < domaintmp | awk '{print "# TOTAL:", $1}' >> rules/domains_refilter.list
          cat domaintmp >> rules/domains_refilter.list
          rm domaintmp temp3.txt

      - name: Генерируем ips_refilter.list
        run: |
          curl -s https://raw.githubusercontent.com/1andrevich/Re-filter-lists/refs/heads/main/community_ips.lst > ips1.txt
          curl -s https://raw.githubusercontent.com/1andrevich/Re-filter-lists/refs/heads/main/discord_ips.lst >> ips1.txt
          curl -s https://raw.githubusercontent.com/1andrevich/Re-filter-lists/refs/heads/main/ipsum.lst >> ips1.txt
          sed 's/^/IP-CIDR,/g' ips1.txt | sort -u > temp_ips.list
          echo "# Количество IP-адресов: $(wc -l < temp_ips.list)" > rules/ips_refilter.list
          cat temp_ips.list >> rules/ips_refilter.list
          rm ips1.txt temp_ips.list

      - name: Генерируем domains_banking.list
        run: |
          cat > /tmp/decode_idn.py << 'PYEOF'
          import sys, urllib.parse
          for line in sys.stdin:
              line = line.strip().lower()
              if not line:
                  continue
              try:
                  decoded = urllib.parse.unquote(line)
                  parts = decoded.split('.')
                  has_cyrillic = any(ord(c) > 127 for p in parts for c in p)
                  encoded_parts = [
                      p.encode('idna').decode('ascii') if any(ord(c) > 127 for c in p) else p
                      for p in parts
                  ]
                  punycode = '.'.join(encoded_parts)
                  if has_cyrillic:
                      print(f"{punycode} # {decoded}")
                  else:
                      print(punycode)
              except Exception:
                  print(line)
          PYEOF

          curl -s https://www.cbr.ru/banking_sector/credit/cowebsites/ | \
          grep -oP 'href="\K[^"]+' | \
          grep -E '^https?://' | \
          sed -E 's~https?://~~' | \
          sed -E 's~/.*~~' | \
          tr '[:upper:]' '[:lower:]' | \
          sed -E 's/^www\.//' | \
          grep -E '^[a-zA-Z0-9%._-]+\.[a-zA-Z0-9%_-]+$' | \
          grep -vE '(t\.me|vk\.com|ok\.ru|telegram|dzen|twitter|youtube|zen\.yandex|rutube|linkedin|play\.google|apps\.apple|appgallery|market\.yandex|max\.ru)' | \
          python3 /tmp/decode_idn.py | \
          sort -u > /tmp/temp_banking.txt

          {
            echo "# NAME: domains_banking.list"
            echo "# AUTHOR: misha-tgshv"
            echo "# REPO: https://github.com/misha-tgshv/shadowrocket-configuration-file"
            echo "# UPDATED: $(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M:%S') MSK"
            echo "# SOURCE: https://www.cbr.ru/banking_sector/credit/cowebsites/"
            echo "# TOTAL: $(grep -c '^' /tmp/temp_banking.txt)"
            awk '{
              if ($2) print "DOMAIN-SUFFIX," $1 " " $2 " " $3
              else print "DOMAIN-SUFFIX," $1
            }' /tmp/temp_banking.txt
          } > rules/domains_banking.list

          rm /tmp/decode_idn.py /tmp/temp_banking.txt

      - name: Генерируем domains_ipchecker.list
        run: |
          cat > /tmp/ipchecker.txt << 'EOF'
          ipify.org
          ifconfig.me
          x5static.net
          checkip.amazonaws.com
          eu.2gis.com
          ping.ozon.kz
          EOF
  
          sort -u /tmp/ipchecker.txt > /tmp/ipchecker_sorted.txt
  
          {
            echo "# NAME: domains_ipchecker.list"
            echo "# AUTHOR: misha-tgshv"
            echo "# REPO: https://github.com/misha-tgshv/shadowrocket-configuration-file"
            echo "# UPDATED: $(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M:%S') MSK"
            echo "# SOURCE: manual curated list"
            echo "# TOTAL: $(wc -l < /tmp/ipchecker_sorted.txt)"
            sed 's/^/DOMAIN-SUFFIX,/' /tmp/ipchecker_sorted.txt
          } > rules/domains_ipchecker.list
  
          rm /tmp/ipchecker.txt /tmp/ipchecker_sorted.txt


      - name: Генерируем custom-proxy.list
        run: |
          cat > /tmp/custom-proxy.txt << 'EOF'
          p16-sign-va.tiktokcdn.com
          p16-sign-sg.tiktokcdn.com
          sf-ssp.tiktokcdn.com
          cp-rp16-normal-ycru.tiktokv.com
          habr.com
          EOF
      
          sort -u -o /tmp/custom-proxy.txt /tmp/custom-proxy.txt
      
          {
            echo "# NAME: custom-proxy.list"
            echo "# AUTHOR: misha-tgshv"
            echo "# REPO: https://github.com/misha-tgshv/shadowrocket-configuration-file"
            echo "# UPDATED: $(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M:%S') MSK"
            echo "# SOURCE: manual curated list"
            echo "# TOTAL: $(wc -l < /tmp/custom-proxy.txt)"
            sed 's/^/DOMAIN-SUFFIX,/' /tmp/custom-proxy.txt
          } > rules/custom-proxy.list
      
          rm -f /tmp/custom-proxy.txt
  
      # --- Генерация скриптов ---
      - name: Генерируем rewrite.youtube.response.preview.js
        run: |
          curl -sSL "https://raw.githubusercontent.com/Maasea/sgmodule/refs/heads/master/Script/Youtube/youtube.response.js" > temp.txt
          sed 's/;e!/;e/g' temp.txt > scripts/rewrite.youtube.response.preview.js
          rm temp.txt

      # --- Генерация модулей ---
      - name: Получаем даты последних изменений
        run: |
          YT_MODULE_DATE=$(curl -s "https://api.github.com/repos/YanbingJiang/Shadowrocket_diy_rules/commits?path=Modules/YT-Premium-V1.module&page=1&per_page=1" | jq -r '.[0].commit.committer.date' | cut -d'T' -f1)
          YT_SCRIPT_DATE=$(curl -s "https://api.github.com/repos/Maasea/sgmodule/commits?path=Script/Youtube/youtube.response.js&page=1&per_page=1" | jq -r '.[0].commit.committer.date' | cut -d'T' -f1)
          echo "YT_MODULE_DATE=$YT_MODULE_DATE" >> $GITHUB_ENV
          echo "YT_SCRIPT_DATE=$YT_SCRIPT_DATE" >> $GITHUB_ENV

      - name: Генерируем YT-Premium-V1-RU.module
        run: |
          curl -sSL https://raw.githubusercontent.com/YanbingJiang/Shadowrocket_diy_rules/refs/heads/main/Modules/YT-Premium-V1.module \
            | sed -E 's/captionLang:zh-Hans/captionLang:off/g; s/lyricLang:zh-Hans/lyricLang:off/g' \
            | sed "1i# Last modified youtube.response.js: ${{ env.YT_SCRIPT_DATE }}" \
            | sed "1i# Last modified YT-Premium-V1: ${{ env.YT_MODULE_DATE }}" > modules/YT-Premium-V1-RU.module

      - name: Генерируем Certificate.module
        run: |
          mkdir -p modules
          cat > modules/Certificate.module << 'EOF'
          #!name=Certificate Module
          [MITM]
          enable=true
          ca-passphrase=${CA_PASSPHRASE}
          ca-p12=${CA_P12}
          EOF
        env:
          CA_PASSPHRASE: ${{ secrets.CA_PASSPHRASE }}
          CA_P12: ${{ secrets.CA_P12 }}


      # --- Генерация конфигов ---
      - name: Создаем sr_ru_basic.conf с заменой update-url в копии general
        run: |
          CONFNAME="sr_ru_basic.conf"
          cp source/General.txt conf/General.tmp
          sed -i "s|^update-url =.*|update-url = https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/conf/${CONFNAME}|" conf/General.tmp

          {
            cat conf/General.tmp
            echo "# Выборочные правила маршрутизации"
            echo "[Rule]"
            echo "RULE-SET,https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/rules/domains_community.list,PROXY"
            echo "RULE-SET,https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/rules/domain_ips.list,PROXY,no-resolve"
            echo "RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/Telegram/Telegram.list,PROXY"
            echo "RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/Discord/Discord.list,PROXY"
            echo "RULE-SET,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Shadowrocket/Whatsapp/Whatsapp.list,PROXY"
            echo "RULE-SET,https://github.com/toneywhitez/zkeen_rules/releases/latest/download/telegram_ips.list,PROXY,no-resolve"
            echo "RULE-SET,https://github.com/toneywhitez/zkeen_rules/releases/latest/download/meta_ips.list,PROXY,no-resolve"
            echo "FINAL,DIRECT"
          } > conf/${CONFNAME}

          sed -i "1s/^/# @misha-tgshv, built on $(TZ=\"Asia/Novokuznetsk\" date)\n/" conf/${CONFNAME}
          rm conf/General.tmp

      - name: Создаем sr_ru_whitelist.conf с заменой update-url в копии general
        run: |
            CONFNAME="sr_ru_whitelist.conf"
            cp source/General.txt conf/General.tmp
            sed -i "s|^update-url =.*|update-url = https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/conf/${CONFNAME}|" conf/General.tmp
            sed -i 's|^dns-server =.*|dns-server = system|' conf/General.tmp

            {
              cat conf/General.tmp
              echo "# Выборочные правила маршрутизации"
              echo "[Rule]"
              echo "RULE-SET,https://github.com/hydraponique/roscomvpn-geoip/raw/refs/heads/master/release/text/whitelist.txt,DIRECT"
              echo "RULE-SET,https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/whitelist.txt,DIRECT"
              echo "FINAL,PROXY"
            } > conf/${CONFNAME}
    
            sed -i "1s/^/# @misha-tgshv, built on $(TZ=\"Asia/Novokuznetsk\" date)\n/" conf/${CONFNAME}
            rm conf/General.tmp

      - name: Создаем sr_ru_keen.conf с заменой update-url в копии general
        run: |
          CONFNAME="sr_ru_keen.conf"
          cp source/General.txt conf/General.tmp
          sed -i "s|^update-url =.*|update-url = https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/conf/${CONFNAME}|" conf/General.tmp

          {
            cat conf/General.tmp
            echo "# Выборочные правила маршрутизации"
            echo "[Rule]"
            echo "RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/YouTube/YouTube.list,PROXY"
            echo "RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Instagram/Instagram.list,PROXY"
            echo "RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Facebook/Facebook.list,PROXY"
            echo "RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Shadowrocket/Telegram/Telegram.list,PROXY"
            echo "RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/Whatsapp/Whatsapp.list,PROXY"
            echo "RULE-SET,https://github.com/toneywhitez/zkeen_rules/releases/latest/download/telegram_ips.list,PROXY,no-resolve"
            echo "RULE-SET,https://github.com/toneywhitez/zkeen_rules/releases/latest/download/meta_ips.list,PROXY,no-resolve"
            echo "FINAL,DIRECT"
          } > conf/${CONFNAME}

          sed -i "1s/^/# @misha-tgshv, built on $(TZ=\"Asia/Novokuznetsk\" date)\n/" conf/${CONFNAME}
          rm conf/General.tmp

      - name: Создаем sr_nonru_basic.conf с заменой update-url
        run: |
          CONFNAME="sr_nonru_basic.conf"
          cp source/General.txt conf/General.tmp
          sed -i "s|^update-url =.*|update-url = https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/conf/${CONFNAME}|" conf/General.tmp
          
          {
            cat conf/General.tmp
            echo "# Выборочные правила маршрутизации"
            echo "[Rule]"
            echo "DOMAIN-SUFFIX,ru,PROXY"
            echo "DOMAIN-SUFFIX,su,PROXY"
            echo "DOMAIN-SUFFIX,рф,PROXY"
            echo "DOMAIN-KEYWORD,.ru,PROXY"
            echo "DOMAIN-KEYWORD,.su,PROXY"
            echo "DOMAIN-KEYWORD,.рф,PROXY"
            echo "FINAL,DIRECT"
          } > conf/${CONFNAME}

          # Вставляем .ru в строку skip-proxy в conf/${CONFNAME}
          sed -i '/^skip-proxy/ s/$/,*.ru/' conf/${CONFNAME}

          sed -i "1s/^/# @misha-tgshv, built on $(TZ=\"Asia/Novokuznetsk\" date)\n/" conf/${CONFNAME}
          rm conf/General.tmp

      - name: Создаем sr_ru_mini.conf с заменой update-url и проксированием портов и telegram
        run: |
          CONFNAME="sr_ru_mini.conf"
          cp source/General.txt conf/General.tmp
          sed -i "s|^update-url =.*|update-url = https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/conf/${CONFNAME}|" conf/General.tmp
          {
            cat conf/General.tmp
            echo "# Выборочные правила маршрутизации"
            echo "[Rule]"
            # Проксирование портов голосовой связи
            echo "RULE-SET,https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/rules/voice_ports.list,PROXY"
            # Отдельное проксирование для telegram (ключевое слово)
            echo "DOMAIN-KEYWORD,telegram,PROXY"
            # Генерация доменов из community.list
            curl -s https://raw.githubusercontent.com/misha-tgshv/shadowrocket-configuration-file/main/source/community.list | \
            awk '
              BEGIN { before_youtube=1 }
              /^#/ {
                if ($0 == "# youtube") before_youtube=0
                next
              }
              NF == 0 { next }
              {
                if (before_youtube) {
                  print "DOMAIN-KEYWORD," $1 ",PROXY"
                } else {
                  print "DOMAIN-SUFFIX," $1 ",PROXY"
                }
              }
            '
            echo "FINAL,DIRECT"
          } > conf/${CONFNAME}
          sed -i "1s/^/# mini conf, @misha-tgshv, built on $(TZ=\"Asia/Novokuznetsk\" date)\\n/" conf/${CONFNAME}
          sed -i '1G' conf/${CONFNAME}
          rm conf/General.tmp

      - name: Создаем sr_ru_extended.conf без update-url и с пустыми строками после [Rule]
        run: |
          CONFNAME="sr_ru_extended.conf"
          cp source/General.txt conf/General.tmp
          
          # Удаляем строку update-url, если она там есть
          sed -i '/^update-url =/d' conf/General.tmp

          # Закомментируем строку include = sr_ru_extended.conf
          sed -i 's|^\(include = sr_ru_extended.conf\)|# \1|' conf/General.tmp
      
          {
            cat conf/General.tmp
            echo "# Собственные правила маршрутизации"
            echo "[Rule]"
            echo ""
            echo ""
            echo ""
          } > conf/${CONFNAME}
      
          sed -i "1s/^/# @misha-tgshv, built on $(TZ=\"Asia/Novokuznetsk\" date)\n/" conf/${CONFNAME}
      
          rm conf/General.tmp

      - name: Создаем sr_ru_geo.conf
        run: |
          CONFNAME="sr_ru_geo.conf"
          cp source/General.txt conf/General.tmp
          sed -i "s|^update-url =.*|update-url = https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/conf/${CONFNAME}|" conf/General.tmp

          # Меняем комментарий только для sr_ru_geo.conf
          sed -i 's|^# Опционально\. Добавьте эти адреса в настройках программы Settings → GeoLite2 Database$|# Обязательно. Добавьте эти адреса в настройках программы Settings → GeoLite2 Database|' conf/General.tmp

          {
            cat conf/General.tmp
            echo "# Отправляем все сайты в ГЕО напрямую, а остальное в прокси"
            echo "[Rule]"
            echo "RULE-SET,https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/rules/custom-proxy.list,PROXY"
            echo "GEOIP,RU,DIRECT"
            echo "RULE-SET,https://cdn.jsdelivr.net/gh/misha-tgshv/shadowrocket-configuration-file@main/rules/domains_ipchecker.list,DIRECT"
            echo "# DOMAIN-SUFFIX,ru,DIRECT"
            echo "# DOMAIN-SUFFIX,рф,DIRECT"
            echo "# DOMAIN-SUFFIX,su,DIRECT"
            echo ""
            echo "# Final"
            echo "FINAL,PROXY"
          } > conf/${CONFNAME}

          # Вставляем .ru в строку skip-proxy в conf/${CONFNAME}
          sed -i '/^skip-proxy/ s/$/,*.ru,*.su,*.рф/' conf/${CONFNAME}
          
          sed -i "1s/^/# @misha-tgshv, built on $(TZ=\"Asia/Novokuznetsk\" date)\n/" conf/${CONFNAME}
          rm conf/General.tmp

      # --- Коммитим и пушим ---
      - name: Настраиваем git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Добавляем и коммитим новые файлы
        run: |
          git add rules scripts modules conf
          git commit -m "Auto: обновление сгенерированных файлы [skip ci]" || echo "No changes to commit"

      - name: Пушим изменения в main
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
